<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripXplo AI - Hotel Selection Engine</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="mobile-header">
        <div class="logo">
            <span class="icon">✈️</span>
            <h1>TripXplo AI</h1>
        </div>
        <button id="menuToggle" class="menu-btn">☰</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="logo">
            <span class="icon">✈️</span>
            <h1>TripXplo AI</h1>
        </div>
        <p class="subtitle">Intelligent Hotel Engine</p>

        <div class="controls">
            <div class="input-group">
                <label>Target Location</label>
                <input type="text" id="locationInput" value="Global" placeholder="e.g. Goa, Paris" />
            </div>

            <div class="input-group">
                <label>Client Persona</label>
                <div class="persona-cards" id="personaSelect">
                    <div class="persona-card active" data-value="general">
                        <span class="p-icon">🌐</span>
                        General
                    </div>
                    <div class="persona-card" data-value="honeymoon">
                        <span class="p-icon">💖</span>
                        Honeymoon
                    </div>
                    <div class="persona-card" data-value="family">
                        <span class="p-icon">👨‍👩‍👧‍👦</span>
                        Family
                    </div>
                    <div class="persona-card" data-value="budget">
                        <span class="p-icon">💰</span>
                        Budget Planner
                    </div>
                </div>
            </div>

            <button id="findBtn" class="primary-btn">
                <span class="btn-text">Generate AI Recommendations</span>
                <span class="loader hidden"></span>
            </button>
        </div>
    </div>

    <div class="main-content">
        <header>
            <h2>Top AI Ranked Picks</h2>
            <span class="badge" id="personaBadge">Persona: General</span>
        </header>

        <div id="resultsContainer" class="results-container">
            <div class="empty-state">
                <span class="big-icon">🤖</span>
                <p>Select a persona and hit Generate to see AI-ranked hotels based on sentiment, fake-review detection, and keyword analysis.</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
